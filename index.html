<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Odin Library</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>

	<header>
		<h2>Book Library</h2>
		<button id="openFormBtn">Add New Book</button>
	</header>

	<main>
		<div id="book-container">
			<!-- Books will be shown here -->
		</div>
	</main>

	<dialog id="dialogBook" open>
		<form id="formBook" method="dialog">
			<h2>Add Book</h2>

			<!-- TITLE -->
			<div class="form-info">
				<input type="text" name="title" id="title"  required>
				<span class="highlight"></span>
				<span class="bar"></span>
				<label for="title">Title:</label>
			</div>

			<!-- AUTHOR -->
			<div class="form-info">
				<input type="text" name="author" id="author"  required>
				<span class="highlight"></span>
				<span class="bar"></span>
				<label for="author">Author:</label>
			</div>

			<!-- PAGES -->
			<div class="form-info">
				<input type="number" name="pageNumber" id="pageNumber" required min="1">
				<span class="highlight"></span>
				<span class="bar"></span>
				<label for="pageNumber">Number of Pages:</label>
			</div>

			<!-- CHECKBOX -->
			<div class="form-checkbox">
				<label>Have you read it?</label>
				<input type="checkbox" id="checkRead">
			</div>

			<!-- BUTTONS -->
			<div class="form-buttons">
				<button type="button" id="cancelBtn">Cancel</button>
				<button type="submit" id="submitBtn">Add Book</button>
			</div>

		</form>
	</dialog>
	
	<script src="index.js"></script>
</body>
</html>
